services:
  postgres:
    image: postgres:15-alpine
    container_name: univstore-db
    restart: always
    environment:
      POSTGRES_USER: univuser
      POSTGRES_PASSWORD: univpassword
      POSTGRES_DB: univstore
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - univ-network

  redis:
    image: redis:7-alpine
    container_name: univstore-queue
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - univ-network

  dashboard:
    build:
      context: .
      dockerfile: packages/web-dashboard/Dockerfile
    container_name: univstore-dashboard
    restart: always
    environment:
      - DATABASE_URL=postgresql://univuser:univpassword@postgres:5432/univstore?schema=public
      - REDIS_URL=redis://redis:6379
      - VIRTUAL_HOST=choouniv.duckdns.org
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=choouniv.duckdns.org
      - LETSENCRYPT_EMAIL=juebug4027@gmail.com
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - NEXT_PUBLIC_SITE_URL=https://choouniv.duckdns.org
    depends_on:
      - postgres
      - redis
    networks:
      - univ-network
      - proxy-tier

networks:
  univ-network:
    driver: bridge
  proxy-tier:
    external: true
