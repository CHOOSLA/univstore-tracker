x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:15-alpine
    container_name: univstore-db
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - univ-network

  redis:
    image: redis:7-alpine
    container_name: univstore-queue
    restart: always
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - univ-network

  dashboard:
    build:
      context: .
      dockerfile: packages/web-dashboard/Dockerfile
    container_name: univstore-dashboard
    restart: always
    logging: *default-logging
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - REDIS_URL=redis://redis:6379
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=${VIRTUAL_HOST}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_KAKAO_ID=${AUTH_KAKAO_ID}
      - AUTH_KAKAO_SECRET=${AUTH_KAKAO_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET}
      - EMBED_URL=http://embed:8000
    depends_on:
      - postgres
      - redis
    networks:
      - univ-network
      - proxy-tier

  # 상품명 의미 유사도 리랭크 (GTX 1060, sentence-transformers)
  embed:
    build:
      context: ./services/embed
    container_name: univstore-embed
    restart: always
    logging: *default-logging
    environment:
      - EMBED_MODEL=jhgan/ko-sroberta-multitask
    volumes:
      - ./embed_cache:/root/.cache/huggingface
    networks:
      - univ-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  univ-network:
    driver: bridge
  proxy-tier:
    external: true
